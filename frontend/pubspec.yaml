name: growza
description: Growza - Career Advisory App Frontend
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Supabase
  supabase_flutter: ^2.5.6
  
  # State Management
  flutter_riverpod: ^2.5.1
  
  # HTTP Client
  dio: ^5.4.3+1
  
  # Navigation
  go_router: ^14.2.0
  
  # Local Storage
  shared_preferences: ^2.2.3
  
  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  
  # Utils
  intl: ^0.19.0
  
  # Environment Variables
  flutter_dotenv: ^5.1.0
  
  # Image Picker
  image_picker: ^1.0.7
  
  # File Picker
  file_picker: ^6.1.1
  
  # JSON Serialization
  json_annotation: ^4.8.1
  
  # Flutter Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Code Generation
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - .env
  
  # Fonts 
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700