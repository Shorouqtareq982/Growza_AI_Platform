plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.growza"
    compileSdk 36
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
        coreLibraryDesugaringEnabled true  //     ده موجود كويس
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_11.toString()
    }

    defaultConfig {
        applicationId = "com.example.growza"
        
        //     التعديل الأهم هنا - خلي minSdk 21 مش flutter.minSdkVersion
        minSdkVersion flutter.minSdkVersion  // <- غير flutter.minSdkVersion إلى 21
        targetSdkVersion 36
        
        versionCode flutter.versionCode
        versionName flutter.versionName
        
        manifestPlaceholders = [appAuthRedirectScheme: "io.supabase.growza"]
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    implementation "androidx.core:core-ktx:1.12.0"
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.5"  //     موجود كويس
}
